<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUET PRO Mock</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
--bg:#0a0c10;
--card:#111318;
--border:#2a2d38;
--accent:#f0b429;
--green:#22c55e;
--red:#ef4444;
--text:#e8eaf0;
}

body{margin:0;font-family:Inter;background:var(--bg);color:var(--text)}

/* INTRO */
#intro {
display:flex;flex-direction:column;justify-content:center;align-items:center;
height:100vh;text-align:center;
}

.title{font-size:50px;font-weight:800}
.start{margin-top:30px;padding:15px 40px;background:var(--accent);border:none;cursor:pointer}

/* EXAM */
#exam{display:none;height:100vh;flex-direction:column}

.top{display:flex;justify-content:space-between;padding:15px;background:var(--card)}
.timer{color:var(--accent);font-size:20px}

.container{display:flex;flex:1}
.sidebar{width:220px;background:var(--card);overflow:auto}
.palette{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:10px}
.palette button{height:35px;background:#1a1d24;border:none;color:#aaa}
.active{background:var(--accent);color:black}
.answered{background:var(--green);color:black}

.main{flex:1;padding:20px}
.option{padding:12px;border:1px solid var(--border);margin:8px 0;cursor:pointer}
.selected{background:var(--accent);color:black}

/* RESULT */
#result{display:none;text-align:center;padding:40px}
.score{font-size:60px}

</style>
</head>

<body>

<div id="intro">
<h1 class="title">CUET PRO MOCK</h1>
<button class="start" onclick="startExam()">Begin Exam</button>
</div>

<div id="exam">
<div class="top">
<div>Exam</div>
<div class="timer" id="timer">180:00</div>
</div>

<div class="container">
<div class="sidebar"><div class="palette" id="palette"></div></div>

<div class="main">
<h3 id="qNo"></h3>
<div id="question"></div>
<div id="options"></div>

<button onclick="prevQ()">Prev</button>
<button onclick="nextQ()">Next</button>
<button onclick="submitExam()">Submit</button>
</div>
</div>
</div>

<div id="result">
<h1>Result</h1>
<div class="score" id="score"></div>
<p id="stats"></p>
</div>

let currentQ=0;
let answers=new Array(questions.length).fill(null);
let timeLeft=10800;

function startExam(){
document.getElementById("intro").style.display="none";
document.getElementById("exam").style.display="flex";
buildPalette();
renderQ();
}

function buildPalette(){
const p=document.getElementById("palette");
questions.forEach((_,i)=>{
let b=document.createElement("button");
b.innerText=i+1;
b.onclick=()=>{currentQ=i;renderQ();}
b.id="p"+i;
p.appendChild(b);
});
}

function renderQ(){
let q=questions[currentQ];
document.getElementById("qNo").innerText="Question "+(currentQ+1);
document.getElementById("question").innerText=q.q;

let o=document.getElementById("options");
o.innerHTML="";

q.opts.forEach((opt,i)=>{
let d=document.createElement("div");
d.className="option";
if(answers[currentQ]==i)d.classList.add("selected");
d.innerText=opt;
d.onclick=()=>{answers[currentQ]=i;renderQ();}
o.appendChild(d);
});
updatePalette();
}

function updatePalette(){
questions.forEach((_,i)=>{
let b=document.getElementById("p"+i);
b.classList.remove("active","answered");
if(i==currentQ)b.classList.add("active");
else if(answers[i]!=null)b.classList.add("answered");
});
}

function nextQ(){if(currentQ<questions.length-1){currentQ++;renderQ();}}
function prevQ(){if(currentQ>0){currentQ--;renderQ();}}

function submitExam(){
let c=0,w=0,skip=0;
questions.forEach((q,i)=>{
if(answers[i]==null)skip++;
else if(answers[i]==q.ans)c++;
else w++;
});

document.getElementById("exam").style.display="none";
document.getElementById("result").style.display="block";

let score=c*5-w;
document.getElementById("score").innerText=score+"/"+(questions.length*5);
document.getElementById("stats").innerText=
"Correct: "+c+" | Wrong: "+w+" | Skipped: "+skip;
}

setInterval(()=>{
timeLeft--;
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
document.getElementById("timer").innerText=
String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
},1000);

</script>
